- name: Search for additional Nginx configuration files
  ansible.builtin.shell: |
    set -o pipefail
    CONFIG_DIR="{{ item.config_dir }}"
    DISTRO_FAMILY="{{ item.distro_family }}"
    ADDITIONAL_CONFIGS="[]"

    if [ -d "$CONFIG_DIR" ]; then
      # Distribution-specific config discovery
      case "$DISTRO_FAMILY" in
        "RedHat")
          # RHEL/CentOS/Fedora: conf.d/*.conf
          ADDITIONAL_CONFIGS=$(find "$CONFIG_DIR" -name "*.conf" -type f \
            -path "*/conf.d/*" \
            2>/dev/null | head -20 | jq -R . | jq -s . || echo "[]")
          ;;
        "Debian")
          # Debian/Ubuntu: sites-enabled/*.conf, conf.d/*.conf
          ADDITIONAL_CONFIGS=$(find "$CONFIG_DIR" -name "*.conf" -type f \
            -path "*/sites-enabled/*" -o -path "*/conf.d/*" \
            2>/dev/null | head -20 | jq -R . | jq -s . || echo "[]")
          ;;
        "Suse")
          # SUSE: conf.d/*.conf, vhosts.d/*.conf
          ADDITIONAL_CONFIGS=$(find "$CONFIG_DIR" -name "*.conf" -type f \
            -path "*/conf.d/*" -o -path "*/vhosts.d/*" \
            2>/dev/null | head -20 | jq -R . | jq -s . || echo "[]")
          ;;
        *)
          # Generic: find all .conf files
          ADDITIONAL_CONFIGS=$(find "$CONFIG_DIR" -name "*.conf" -type f \
            2>/dev/null | head -20 | jq -R . | jq -s . || echo "[]")
          ;;
      esac
    fi

    echo "{\"{{ item.pid }}\": $ADDITIONAL_CONFIGS}"
  args:
    executable: /bin/bash
  loop: "{{ webserver_processes_raw }}"
  when: item.type == 'nginx'
  register: nginx_additional_configs_shell
  changed_when: false
  failed_when: false
  no_log: "{{ not log }}"

- name: Create nginx_additional_configs info
  ansible.builtin.set_fact:
    nginx_additional_configs: "{{ nginx_additional_configs | default({}) | combine(item.stdout | from_json) }}"
  loop: "{{ nginx_additional_configs_shell.results }}"
  when: item.stdout is defined
  no_log: "{{ not log }}"

- name: Debug nginx_additional_configs
  ansible.builtin.debug:
    var: nginx_additional_configs
  when: debug

- name: Extract Nginx sites-enabled (Debian/Ubuntu style)
  ansible.builtin.shell: |
    set -o pipefail
    CONFIG_DIR="{{ item.config_dir }}"
    DISTRO_FAMILY="{{ item.distro_family }}"
    SITES_ENABLED="[]"

    if [ "$DISTRO_FAMILY" = "Debian" ] && [ -d "$CONFIG_DIR/sites-enabled" ]; then
      SITES_ENABLED=$(find "$CONFIG_DIR/sites-enabled" -type f \( -name "*.conf" -o ! -name ".*" \) \
        2>/dev/null | head -20 | jq -R . | jq -s . || echo "[]")
    fi

    echo "{\"{{ item.pid }}\": $SITES_ENABLED}"
  args:
    executable: /bin/bash
  loop: "{{ webserver_processes_raw }}"
  when: item.type == 'nginx'
  register: nginx_sites_enabled_shell
  changed_when: false
  failed_when: false
  no_log: "{{ not log }}"

- name: Create nginx_sites_enabled info
