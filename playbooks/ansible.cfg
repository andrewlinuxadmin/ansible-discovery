[defaults]
inventory=./inventory
collections_path = ./collections
filter_plugins = ./filter_plugins
library = ./library
fact_caching = community.mongodb.mongodb
fact_caching_timeout = 0
fact_caching_connection = mongodb://localhost:27017/ansible
host_key_checking = False
stdout_callback = yaml
retry_files_enabled = False
interpreter_python = auto_silent

[inventory]
# Define a ordem de descoberta de Python: tenta Python 3 primeiro, depois Python 2.7
# Se nenhum funcionar, usa 'auto' para detectar automaticamente
enable_plugins = host_list, script, auto, yaml, ini, toml

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
